<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-card {
            border: 2px solid #0058be;
            background-color: #f3f3fe;
            transform: translateY(-4px);
        }
        .glass-header {
            background: rgba(250, 248, 255, 0.8);
            backdrop-filter: blur(12px);
        }
        .soft-shadow {
            box-shadow: 0 4px 20px -2px rgba(15, 23, 42, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen font-body-md flex flex-col">
<!-- Header (Suppressed Nav Shell Logic for Task-Focused Page) -->
<header class="glass-header sticky top-0 z-50 w-full h-16 border-b border-outline-variant/30 flex items-center px-6">
<a class="flex items-center gap-2" href="index.html">
<span class="material-symbols-outlined text-primary text-3xl">event_note</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Eventify</span>
</a>
<div class="ml-auto">
<a class="p-2 hover:bg-surface-container-low rounded-full transition-colors block" href="opportunity.html">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</a>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-4 md:p-8">
<div class="w-full max-w-4xl mx-auto space-y-10">
<!-- Step Indicator & Heading -->
<div class="text-center space-y-4">
<div class="inline-flex items-center gap-2 px-4 py-1.5 bg-surface-container-high rounded-full">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="font-label-md text-label-md text-on-surface-variant">Step 1 of 3</span>
</div>
<div class="space-y-2">
<h1 class="font-headline-lg text-headline-lg text-on-surface">How would you like to participate?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg mx-auto">Select how you want to join this competition.</p>
</div>
</div>
<!-- Participation Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<!-- Solo Card -->
<button class="participation-card flex flex-col items-start p-6 rounded-xl bg-surface border border-outline-variant hover:border-primary/50 hover:bg-surface-container-low transition-all duration-300 text-left soft-shadow group relative" data-next="opportunity.html" onclick="selectOption(this)">
<div class="absolute top-4 right-4 opacity-0 group-[.active-card]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-12 h-12 rounded-lg bg-primary-fixed flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="person">person</span>
</div>
<div class="space-y-3 mb-8 flex-grow">
<h3 class="font-title-lg text-title-lg text-on-surface">Participate Solo</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Join as an individual competitor.</p>
</div>
<span class="inline-block px-3 py-1 rounded-full bg-surface-container-highest text-on-surface-variant font-label-sm text-label-sm">
                        No team required
                    </span>
</button>
<!-- Looking for Team Card -->
<button class="participation-card flex flex-col items-start p-6 rounded-xl bg-surface border border-outline-variant hover:border-primary/50 hover:bg-surface-container-low transition-all duration-300 text-left soft-shadow group relative" data-next="teams.html" onclick="selectOption(this)">
<div class="absolute top-4 right-4 opacity-0 group-[.active-card]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-12 h-12 rounded-lg bg-secondary-fixed flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-secondary text-2xl" data-icon="groups">groups</span>
</div>
<div class="space-y-3 mb-8 flex-grow">
<h3 class="font-title-lg text-title-lg text-on-surface">Looking for a Team</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Browse existing teams and request to join one.</p>
</div>
<span class="inline-block px-3 py-1 rounded-full bg-secondary-container/10 text-secondary font-label-sm text-label-sm">
                        Find teammates easily
                    </span>
</button>
<!-- Create Team Card -->
<button class="participation-card flex flex-col items-start p-6 rounded-xl bg-surface border border-outline-variant hover:border-primary/50 hover:bg-surface-container-low transition-all duration-300 text-left soft-shadow group relative" data-next="create-team.html" onclick="selectOption(this)">
<div class="absolute top-4 right-4 opacity-0 group-[.active-card]:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-12 h-12 rounded-lg bg-tertiary-fixed flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-tertiary text-2xl" data-icon="add_circle">add_circle</span>
</div>
<div class="space-y-3 mb-8 flex-grow">
<h3 class="font-title-lg text-title-lg text-on-surface">Create a Team</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Create your own team and recruit members.</p>
</div>
<span class="inline-block px-3 py-1 rounded-full bg-tertiary-fixed-dim/20 text-tertiary font-label-sm text-label-sm border border-tertiary/20">
                        Become a team leader
                    </span>
</button>
</div>
<!-- Action Button -->
<div class="flex flex-col items-center pt-8">
<button class="w-full md:w-64 py-4 px-8 rounded-full bg-primary text-on-primary font-title-lg text-title-lg shadow-lg hover:bg-primary-container active:scale-95 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100" disabled="" id="continue-btn">
                    Continue
                </button>
<p class="mt-4 font-label-md text-label-md text-on-surface-variant">You can change this later in your profile settings.</p>
</div>
</div>
</main>
<!-- Footer Identity -->
<footer class="py-8 border-t border-outline-variant/20 bg-surface-container-lowest">
<div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
<div class="flex items-center gap-4">
<span class="font-label-md text-label-md text-on-surface-variant">© 2024 Global AI Innovation Hackathon</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<a class="font-label-md text-label-md text-primary hover:underline" href="about.html">Privacy Policy</a>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer transition-colors" data-icon="share">share</span>
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary cursor-pointer transition-colors" data-icon="help_outline">help_outline</span>
</div>
</div>
</footer>
<!-- Background Decorative Element -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl opacity-30"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[600px] h-[600px] bg-secondary/5 rounded-full blur-3xl opacity-30"></div>
</div>
<script>
        let nextDestination = null;

        function selectOption(selectedCard) {
            // Remove active state from all cards
            const cards = document.querySelectorAll('.participation-card');
            cards.forEach(card => {
                card.classList.remove('active-card');
            });

            // Add active state to selected card
            selectedCard.classList.add('active-card');
            nextDestination = selectedCard.dataset.next;

            // Enable continue button
            const btn = document.getElementById('continue-btn');
            btn.disabled = false;

            // Add a little pop animation on click
            selectedCard.style.transform = 'scale(0.98)';
            setTimeout(() => {
                selectedCard.style.transform = 'translateY(-4px) scale(1)';
            }, 100);
        }

        document.getElementById('continue-btn').addEventListener('click', () => {
            if (nextDestination) window.location.href = nextDestination;
        });
    </script>
</body></html>
